name: Backend CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
    types: [opened, reopened, synchronize]

# Cancel in-flight runs on the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run build` runs `eslint . --quiet` which fails on errors only.
      # This mirrors the "strict lint" check described in the cocowiki.
      - name: Run ESLint in strict mode
        run: bun run build

  prisma-validate:
    name: Prisma schema validate
    runs-on: ubuntu-latest
    # The schema references env("DATABASE_URL"), so `prisma validate` needs
    # the variable to be set even though it doesn't actually connect.
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        run: bunx prisma validate

      - name: Check Prisma schema formatting
        run: |
          bunx prisma format
          if ! git diff --quiet -- prisma/schema.prisma; then
            echo "::error::prisma/schema.prisma is not formatted. Run 'bunx prisma format' and commit the result."
            git --no-pager diff -- prisma/schema.prisma
            exit 1
          fi

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cocoscheme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d cocoscheme_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node (for jest + prisma seed)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          PORT=3000
          NODE_ENV=test
          DATABASE_URL=postgresql://test:test@localhost:5432/cocoscheme_test?schema=public
          MONGO_URI=mongodb://localhost:27017
          AES_SECRET_KEY=12345678901234567890123456789012
          JWT_SECRET=test_jwt_secret_key_for_github_actions
          MAIL_USER=test.mail@outlook.com
          MAIL_PASSWORD=test_password
          CORS_ORIGIN=http://localhost:4321,https://localhost:4321
          EOF

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply schema
        run: bunx prisma db push --force-reset

      - name: Seed database
        run: node prisma/seed.js dev

      - name: Run unit tests
        run: bun run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Don't block merges on upstream CVEs we can't fix immediately —
    # surface them but leave the call to a human reviewer.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # The repo uses bun.lock, not package-lock.json, so we generate a
      # throwaway lockfile for npm audit to consume. --ignore-scripts keeps
      # this fast and avoids running any install hooks.
      - name: Generate throwaway package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Run npm audit (high severity and above)
        run: npx --yes better-npm-audit audit --level high --production
