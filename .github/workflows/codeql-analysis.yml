name: "CodeQL Analysis - Backend"

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main
      - development
  schedule:
    - cron: '0 7 * * 1' # Runs every Monday at 7 am

permissions:
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze code
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Install dependencies (Bun + bun.lock — mismo criterio que ci.yml; evita
    # postinstall nativo de @swc/core vía npm, que en ubuntu-latest puede fallar con bus error)
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Install dependencies
      run: bun install --frozen-lockfile

    # Step 3: Initialize CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript
        config-file: .github/codeql/codeql-config.yml

    # Step 4: Run CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
