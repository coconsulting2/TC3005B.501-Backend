name: Backend CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
    types: [opened, reopened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cocoscheme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d cocoscheme_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node (for jest + prisma seed)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          PORT=3000
          NODE_ENV=test
          DATABASE_URL=postgresql://test:test@localhost:5432/cocoscheme_test?schema=public
          MONGO_URI=mongodb://localhost:27017
          AES_SECRET_KEY=12345678901234567890123456789012
          JWT_SECRET=test_jwt_secret_key_for_github_actions
          MAIL_USER=test.mail@outlook.com
          MAIL_PASSWORD=test_password
          CORS_ORIGIN=http://localhost:4321,https://localhost:4321
          EOF

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply schema
        run: bunx prisma db push --force-reset

      - name: Seed database
        run: node prisma/seed.js dev

      - name: Run unit tests
        run: bun run test
