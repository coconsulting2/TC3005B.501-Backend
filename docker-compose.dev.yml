# Local development stack with hot-reload.
#
#   bun run docker:dev          # foreground, streams logs
#   bun run docker:dev:build    # rebuild base image first
#   bun run docker:dev:down     # stop containers
#   bun run docker:dev:clean    # stop AND wipe volumes (full reset)
#
# What this does:
#  - Starts Postgres 16 + Mongo 7 with healthchecks.
#  - One-shot `migrate` service: bun install → prisma generate → db push → seed.
#    Runs to completion before the backend starts. Re-runs on every `up` but
#    bun + prisma + the seed are all idempotent.
#  - Backend service: bind-mounts the host source at /app, runs `node --watch
#    index.js`. File changes on the host hot-reload the server.
#  - Named volumes for: pgdata, mongodata, certs (auto-generated HTTPS),
#    node_modules_dev (avoids overlaying the host's node_modules).
name: cocoscheme-dev

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cocoscheme
      POSTGRES_PASSWORD: cocoscheme_dev
      POSTGRES_DB: CocoScheme
    # Host 5432 suele chocar con Postgres nativo de Windows (:: + 0.0.0.0).
    # DBeaver / herramientas en el PC: 127.0.0.1:5434 (contenedor sigue en 5432).
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocoscheme -d CocoScheme"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cocoscheme

  mongo:
    image: mongo:7
    restart: unless-stopped
    # GridFS-only — we don't tail mongo logs while developing the API.
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Drop docker's log collection too so `docker compose logs -f` stays focused
    # on the backend instead of being drowned in connection-open/close noise.
    logging:
      driver: none
    networks:
      - cocoscheme

  # S3 API compatible (LocalStack). El backend usa el mismo código que en AWS;
  # en dev: AWS_S3_ENDPOINT apunta aquí; en prod: sin endpoint (SDK regional).
  localstack:
    image: localstack/localstack:3.5
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - cocoscheme

  s3-init:
    image: amazon/aws-cli:2.17.54
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        aws --endpoint-url=http://localstack:4566 s3 mb s3://coco-consulting-local 2>/dev/null || true
    networks:
      - cocoscheme

  # One-shot: install deps into the shared volume, generate the Prisma client,
  # apply the schema, and seed.
  #
  # Seeding policy:
  #  - Reference data (roles, request statuses, receipt types, PERMISSIONS and
  #    permission groups) is idempotent (upsert + skipDuplicates). It runs on
  #    EVERY `up` so that when a teammate adds a new permission to
  #    prisma/seed.js, their PR lands automatically on other devs' machines
  #    without a manual `docker:dev:clean`.
  #  - Dummy data (Requests, Routes, Receipts via plain `create`) is NOT
  #    idempotent. It is gated by a sentinel file inside the node_modules_dev
  #    volume so it only runs on first boot. To force a full re-seed run
  #    `bun run docker:dev:clean` which removes all volumes.
  #
  # IMPORTANT: env vars below are HARDCODED dev defaults. Compose's
  # ${VAR:-default} substitution reads from the host .env file, which is
  # gitignored and may contain placeholders. To override safely, edit this
  # file directly or use a separate compose override file.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    environment:
      DATABASE_URL: postgresql://cocoscheme:cocoscheme_dev@postgres:5432/CocoScheme?schema=public
      AES_SECRET_KEY: "12345678901234567890123456789012"
      JWT_SECRET: dev_jwt_secret_change_me
    volumes:
      - ./:/app
      - node_modules_dev:/app/node_modules
    command: >
      sh -c "bun install &&
             bunx prisma generate &&
             bunx prisma db push --accept-data-loss &&
             if [ ! -f /app/node_modules/.seeded ]; then
               echo '[migrate] First run — seeding reference data + dummy data...' &&
               node prisma/seed.js dev &&
               touch /app/node_modules/.seeded;
             else
               echo '[migrate] Re-applying reference seed (idempotent — permissions, roles, statuses)...' &&
               node prisma/seed.js;
             fi"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cocoscheme

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://cocoscheme:cocoscheme_dev@postgres:5432/CocoScheme?schema=public
      MONGO_URI: mongodb://mongo:27017
      CORS_ORIGIN: http://localhost:4321,https://localhost:4321
      AES_SECRET_KEY: "12345678901234567890123456789012"
      JWT_SECRET: dev_jwt_secret_change_me
      MAIL_USER: test.mail@outlook.com
      MAIL_PASSWORD: changeme
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: coco-consulting-local
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source for hot reload (node --watch picks up file changes).
      - ./:/app
      # Override host node_modules with a clean linux build inside the container.
      - node_modules_dev:/app/node_modules
      # Persist auto-generated HTTPS certs across restarts.
      - certs:/app/certs
    # On first start /app/certs (named volume) is empty. Generate certs in place
    # using the baked-in script + openssl.cnf template. create_certs.sh uses
    # relative paths so we cd in first.
    #
    # Check for all three required cert files — a previous half-failed run can
    # leave server.crt without server.key (or vice versa) and we want to
    # regenerate from scratch in that case rather than skip and crash on read.
    command: >
      sh -c "if [ ! -f /app/certs/server.crt ] || [ ! -f /app/certs/server.key ] || [ ! -f /app/certs/ca.crt ]; then
               echo '[dev] HTTPS certs missing or incomplete - regenerating...' &&
               rm -f /app/certs/server.crt /app/certs/server.key /app/certs/ca.crt /app/certs/ca.key /app/certs/server.csr /app/certs/ca.srl &&
               cp /opt/openssl.cnf.template /app/certs/openssl.cnf &&
               cp /opt/create_certs.sh /app/certs/create_certs.sh &&
               chmod +x /app/certs/create_certs.sh &&
               cd /app/certs && ./create_certs.sh && cd /app;
             fi &&
             node --watch index.js"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      s3-init:
        condition: service_completed_successfully
    networks:
      - cocoscheme

volumes:
  pgdata:
  mongodata:
  certs:
  node_modules_dev:
  localstack_data:

networks:
  cocoscheme:
    driver: bridge
