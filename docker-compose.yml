# Release stack: pulls the published backend image from GHCR and runs it
# alongside Postgres. End-users grab this file and run:
#
#   curl -O https://raw.githubusercontent.com/coconsulting2/TC3005B.501-Backend/main/docker-compose.yml
#   docker compose up -d
#
# Override secrets via a sibling .env file (AES_SECRET_KEY, JWT_SECRET, mail creds).
# Almacenamiento de archivos: AWS S3 (define AWS_REGION + AWS_S3_BUCKET; en EC2
# usa un IAM role, fuera de EC2 define AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY).
name: cocoscheme

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cocoscheme
      POSTGRES_PASSWORD: cocoscheme_dev
      POSTGRES_DB: CocoScheme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocoscheme -d CocoScheme"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cocoscheme

  backend:
    image: ghcr.io/coconsulting2/tc3005b-501-backend:latest
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://cocoscheme:cocoscheme_dev@postgres:5432/CocoScheme?schema=public
      CORS_ORIGIN: http://localhost:4321,https://localhost:4321
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AES_SECRET_KEY: ${AES_SECRET_KEY:-12345678901234567890123456789012}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      MAIL_USER: ${MAIL_USER:-test.mail@outlook.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      RUN_MIGRATIONS: "true"
      SEED_DUMMY_DATA: "true"
    volumes:
      - certs:/app/certs
    ports:
      - "3000:3000"
    networks:
      - cocoscheme
    restart: unless-stopped

volumes:
  pgdata:
  certs:

networks:
  cocoscheme:
    driver: bridge
