        "200":
          description: Conteo de no leídas
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/notifications/{id}/read:
    put:
      tags: [Notificaciones]
      summary: Marcar notificación como leída
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Notificación marcada como leída
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Notificación no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════════════════════════════
  # M3 — BORRADORES
  # ═══════════════════════════════════════════════════════════════════
  /api/applicant/create-draft-travel-request/{user_id}:
    post:
      tags: [Borradores]
      summary: Crear borrador de solicitud de viaje
      description: |
        Crea una solicitud de viaje en estado BORRADOR. Los campos son menos estrictos
        que en una solicitud definitiva. Requiere permiso `travel_request:create`.
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftTravelRequestInput"
      responses:
        "201":
          description: Borrador creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelRequestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/applicant/confirm-draft-travel-request/{user_id}/{request_id}:
    put:
      tags: [Borradores]
      summary: Confirmar y enviar borrador de solicitud
      description: |
        Convierte un borrador en solicitud definitiva y la envía al flujo de aprobación.
        Requiere permiso `travel_request:submit`.
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: request_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Solicitud confirmada y enviada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelRequestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Borrador o usuario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════════════════════════════
  # M3 — COMENTARIOS
  # ═══════════════════════════════════════════════════════════════════
  /api/solicitudes/{id}/comments:
    post:
      tags: [Comentarios]
      summary: Crear comentario en una solicitud
      description: |
        Agrega un comentario a una solicitud. El JWT `user_id` debe coincidir con el `user_id` del body.
        Requiere autenticación.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SolicitudId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comentario creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Successfully posted comment"
        "400":
          description: Validación fallida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: No se puede comentar como otro usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Comentarios]
      summary: Obtener comentarios de una solicitud (paginados)
      description: Retorna comentarios con paginación keyset. Requiere autenticación.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SolicitudId"
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 10
            maximum: 200
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Comentarios paginados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsResponse"
        "400":
          description: Validación fallida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: No se pueden leer comentarios de otro usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/solicitudes/{id}/comments/stream:
    get:
      tags: [Comentarios]
      summary: Stream de comentarios via Server-Sent Events (SSE)
      description: |
        Establece una conexión SSE para recibir comentarios en tiempo real.
        El servidor emite el lote inicial y actualiza a intervalos regulares.
        `Content-Type: text/event-stream`. Requiere autenticación.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SolicitudId"
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 10
            maximum: 200
      responses:
        "200":
          description: Stream SSE establecido.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/CommentsStreamEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ═══════════════════════════════════════════════════════════════════
# WEBHOOKS — Notificaciones push salientes
# ═══════════════════════════════════════════════════════════════════
webhooks:
  solicitudAprobada:
    post:
      tags: [Webhooks]
      summary: Notificación push — Solicitud aprobada
      description: |
        Enviada al endpoint del navegador (Web Push) cuando una solicitud del usuario
        es aprobada por N1 o N2.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookNotificationPayload"
            example:
              title: "Solicitud aprobada"
              body: "Tu solicitud #42 fue aprobada."
              icon: "/icons/check.png"
              data:
                requestId: 42
                event: "solicitud_aprobada"
      responses:
        "200":
          description: Notificación recibida por el service worker del browser.
        "410":
          description: Suscripción expirada — el servidor la elimina de BD.

  solicitudRechazada:
    post:
      tags: [Webhooks]
      summary: Notificación push — Solicitud rechazada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookNotificationPayload"
            example:
              title: "Solicitud rechazada"
              body: "Tu solicitud #42 fue rechazada."
              icon: "/icons/reject.png"
              data:
                requestId: 42
                event: "solicitud_rechazada"
      responses:
        "200":
          description: Notificación recibida.
        "410":
          description: Suscripción expirada.

  comprobantesRequeridos:
    post:
      tags: [Webhooks]
      summary: Notificación push — Comprobantes requeridos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookNotificationPayload"
            example:
              title: "Carga tus comprobantes"
              body: "Tu solicitud #42 requiere comprobantes."
              icon: "/icons/receipt.png"
              data:
                requestId: 42
                event: "comprobantes_requeridos"
      responses:
        "200":
          description: Notificación recibida.
        "410":
          description: Suscripción expirada.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ReceiptId:
      name: receipt_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OrgId:
      name: id
      in: path
      required: true
      description: ID de la organización (BigInt como string).
      schema:
        type: string
        pattern: "^[1-9][0-9]*$"
    UserId:
      name: userId
      in: path
      required: true
      description: ID numérico del usuario.
      schema:
        type: integer
        minimum: 1
    SolicitudId:
      name: id
      in: path
      required: true
      description: ID numérico de la solicitud de viaje.
      schema:
        type: integer
        minimum: 1

  responses:
    Unauthorized:
      description: Token ausente o inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthErrorResponse"
    Forbidden:
      description: Rol o permiso insuficiente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthErrorResponse"
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Internal server error"

  schemas:
    # ── Comunes ─────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AuthErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string
      required: [statusCode, message, error]

    ValidationErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              msg:
                type: string
              path:
                type: string
      required: [errors]

    # ── M1: CFDI ─────────────────────────────────
    CfdiCreateRequest:
      type: object
      required:
        - uuid
        - fecha_timbrado
        - rfc_pac
        - fecha_emision
        - tipo_comprobante
        - lugar_expedicion
        - metodo_pago
        - forma_pago
        - moneda
        - subtotal
        - total
        - rfc_emisor
        - nombre_emisor
        - regimen_fiscal_emisor
        - rfc_receptor
        - nombre_receptor
        - domicilio_fiscal_receptor
        - regimen_fiscal_receptor
        - uso_cfdi
      properties:
        uuid:
          type: string
          format: uuid
        fecha_timbrado:
          type: string
          format: date-time
        rfc_pac:
          type: string
        version:
          type: string
          enum: ["3.3", "4.0"]
        serie:
          type: string
        folio:
          type: string
        fecha_emision:
          type: string
          format: date-time
        tipo_comprobante:
          type: string
          enum: ["I", "E", "T", "P", "N"]
        lugar_expedicion:
          type: string
        exportacion:
          type: string
          enum: ["01", "02", "03", "04"]
        metodo_pago:
          type: string
          enum: ["PUE", "PPD"]
        forma_pago:
          type: string
        moneda:
          type: string
        tipo_cambio:
          type: number
        subtotal:
          type: number
        descuento:
          type: number
        iva:
          type: number
        total:
          type: number
        rfc_emisor:
          type: string
        nombre_emisor:
          type: string
        regimen_fiscal_emisor:
          type: string
        rfc_receptor:
          type: string
        nombre_receptor:
          type: string
        domicilio_fiscal_receptor:
          type: string
        regimen_fiscal_receptor:
          type: string
        uso_cfdi:
          type: string
        sello_emisor:
          type: string

    CfdiCreateResponse:
      type: object
      properties:
        cfdiId:
          type: integer
        receiptId:
          type: integer
        uuid:
          type: string
        satEstado:
          type: string
        satValidacionEfos:
          type: string

    ExchangeRateResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            rate:
              type: number
            source:
              type: string
            date:
              type: string
            fromCache:
              type: boolean
        message:
          type: string
      required: [success, data, message]

    ExchangeRateErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
      required: [success, message, error]

    ResumenTramosResponse:
      type: object
      properties:
        viaje_id:
          type: integer
        tramos:
          type: array
          items:
            type: object
            properties:
              tramo_id:
                type: integer
                nullable: true
              router_index:
                type: integer
                nullable: true
              origin_country:
                type: string
                nullable: true
              origin_city:
                type: string
                nullable: true
              destination_country:
                type: string
                nullable: true
              destination_city:
                type: string
                nullable: true
              beginning_date:
                type: string
                nullable: true
              ending_date:
                type: string
                nullable: true
              comprobantes:
                type: array
                items:
                  type: object
                  properties:
                    gasto_tramo_id:
                      type: integer
                    receipt_id:
                      type: integer
                    receipt_type:
                      type: string
                      nullable: true
                    amount:
                      type: number
                    validation:
                      type: string
                      nullable: true
                    submission_date:
                      type: string
                      nullable: true
              total_tramo:
                type: number
        total_general:
          type: number
      required: [viaje_id, tramos, total_general]

    Poliza:
      type: object
      properties:
        header:
          $ref: "#/components/schemas/PolizaHeader"
        detalles:
          type: array
          items:
            $ref: "#/components/schemas/PolizaLine"
      required: [header, detalles]

    PolizaHeader:
      type: object
      properties:
        ID_VIAJE:
          type: string
          maxLength: 10
        DOC_TYPE:
          type: string
          enum: [AV, GV]
        HEADER_TXT:
          type: string
          maxLength: 25
        COMP_CODE:
          type: string
          maxLength: 4
        PSTNG_DATE:
          type: string
          format: date
        CURRENCY:
          type: string
          maxLength: 5
        EXCH_RATE:
          type: number
      required: [ID_VIAJE, DOC_TYPE, HEADER_TXT, COMP_CODE, PSTNG_DATE, CURRENCY, EXCH_RATE]

    PolizaLine:
      type: object
      properties:
        ITEMNO_ACC:
          type: integer
          minimum: 1
        SHKZG:
          type: string
          enum: [S, H]
        GL_ACCOUNT:
          type: string
          maxLength: 10
        COSTCENTER:
          type: string
          maxLength: 10
        VENDOR_NO:
          type: string
          maxLength: 11
        ITEM_TEXT:
          type: string
          maxLength: 50
        AMT_DOCCUR:
          type: number
      required: [ITEMNO_ACC, SHKZG, GL_ACCOUNT, ITEM_TEXT, AMT_DOCCUR]

    AccountingPolizaListItem:
      type: object
      properties:
        id:
          type: string
        requestId:
          type: integer
        polizaIndex:
          type: integer
        docType:
          type: string
        requestMarkedExported:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PolizasResponse:
      type: object
      properties:
        polizas:
          type: array
          items:
            $ref: "#/components/schemas/Poliza"
      required: [polizas]

    # ── M2: Roles y Permisos ────────────────────
    Role:
      type: object
      properties:
        roleId:
          type: integer
        roleName:
          type: string
        maxApprovalAmount:
          type: number
          nullable: true

    RoleCreateInput:
      type: object
      required: [roleName]
      properties:
        roleName:
          type: string
        maxApprovalAmount:
          type: number
          nullable: true

    RoleUpdateInput:
      type: object
      properties:
        roleName:
          type: string
        maxApprovalAmount:
          type: number
          nullable: true

    Permission:
      type: object
      properties:
        permissionId:
          type: integer
        code:
          type: string
        resource:
          type: string
        action:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean

    PermissionCreateInput:
      type: object
      required: [code, resource, action]
      properties:
        code:
          type: string
        resource:
          type: string
        action:
          type: string
        description:
          type: string
          nullable: true

    PermissionUpdateInput:
      type: object
      properties:
        resource:
          type: string
        action:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean

    WorkflowSimulateRequest:
      type: object
      required: [orgId, requestedFee, ruleType]
      properties:
        orgId:
          type: integer
        requestedFee:
          type: number
        ruleType:
          type: string
        paramValue:
          type: string
          nullable: true

    WorkflowSimulateResponse:
      type: object
      properties:
        requiredApprovalLevel:
          type: integer
        rulesEvaluated:
          type: array
          items:
            type: object
            properties:
              ruleId:
                type: integer
              matched:
                type: boolean
              action:
                type: string

    # ── M3: Organizaciones ──────────────────────
    Organization:
      type: object
      properties:
        id:
          type: string
          description: BigInt serializado como string.
        nombre:
          type: string
          maxLength: 100
        razonSocial:
          type: string
          maxLength: 200
          nullable: true
        rfc:
          type: string
          maxLength: 13
          nullable: true
        logoUrl:
          type: string
          nullable: true
        timezone:
          type: string
          default: "America/Mexico_City"
        baseCurrency:
          type: string
          maxLength: 3
          default: "MXN"
        kind:
          type: string
          enum: [ROOT, CLIENT]
        status:
          type: string
          enum: [CONFIGURING, ACTIVE, SUSPENDED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, nombre, kind, status, timezone, baseCurrency]

    OrganizationCreateInput:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          maxLength: 100
        razonSocial:
          type: string
          nullable: true
        rfc:
          type: string
          maxLength: 13
          nullable: true
        timezone:
          type: string
          default: "America/Mexico_City"
        baseCurrency:
          type: string
          maxLength: 3
          default: "MXN"

    OrganizationUpdateInput:
      type: object
      properties:
        nombre:
          type: string
        razonSocial:
          type: string
          nullable: true
        rfc:
          type: string
          nullable: true
        timezone:
          type: string
        baseCurrency:
          type: string
        logoUrl:
          type: string
          nullable: true

    # ── M3: Empleados ────────────────────────────
    EmployeeSyncRequest:
      type: object
      required: [header, detalle]
      properties:
        header:
          type: object
          required: [idTransaction]
          properties:
            idTransaction:
              type: string
        detalle:
          type: object
          required: [noEmpleado, nombre, proveedor, ceco, fechaAlta]
          properties:
            noEmpleado:
              type: string
              maxLength: 10
            nombre:
              type: string
              maxLength: 100
            email:
              type: string
              nullable: true
            jefeInmediato:
              type: string
              maxLength: 10
              nullable: true
            proveedor:
              type: string
              maxLength: 11
            ceco:
              type: string
              maxLength: 10
            status:
              type: string
              enum: ["A", "I"]
              default: "A"
            fechaAlta:
              type: string
              format: date

    EmployeeSyncResponse:
      type: object
      properties:
        idTransaction:
          type: string
          nullable: true
        status:
          type: string
          enum: ["ok", "error"]
        noEmpleado:
          type: string
          nullable: true
        accion_realizada:
          type: string
          nullable: true
      required: [status]

    EmployeeSyncErrorResponse:
      type: object
      properties:
        idTransaction:
          type: string
          nullable: true
        status:
          type: string
          enum: ["error"]
        noEmpleado:
          type: string
          nullable: true
        accion_realizada:
          type: string
          nullable: true
        errores:
          type: array
          items:
            type: string
      required: [status, errores]

    # ── M3: API Keys ─────────────────────────────
    ApiKeyGenerateRequest:
      type: object
      required: [name, org_id, scope, expires_at]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        org_id:
          type: string
          pattern: "^[1-9][0-9]*$"
        scope:
          type: object
        expires_at:
          type: string
          format: date-time

    ApiKeyGenerateResponse:
      type: object
      properties:
        id:
          type: integer
        org_id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Secreto de la clave. Solo se retorna en este response.
        scope:
          type: object
        expires_at:
          type: string
          format: date-time
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        created_by:
          type: integer
      required: [id, org_id, name, key, scope, expires_at, active, created_at, created_by]

    ApiKeyRevokeResponse:
      type: object
      properties:
        id:
          type: integer
        org_id:
          type: string
        name:
          type: string
        active:
          type: boolean
          enum: [false]
        revoked_at:
          type: string
          format: date-time
      required: [id, org_id, name, active, revoked_at]

    ApiKeyListItem:
      type: object
      properties:
        id:
          type: integer
        org_id:
          type: string
        name:
          type: string
        scope:
          type: object
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        created_by:
          type: integer
      required: [id, org_id, name, scope, expires_at, active, created_at, created_by]

    ApiKeyLog:
      type: object
      properties:
        id:
          type: string
        keyId:
          type: integer
        endpoint:
          type: string
        responseCode:
          type: integer
        timestamp:
          type: string
          format: date-time
      required: [id, keyId, endpoint, responseCode, timestamp]

    # ── M3: Reportes ─────────────────────────────
    ExpensesByCCReport:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalAmount:
              type: number
            requestCount:
              type: integer
        byCostCenter:
          type: array
          items:
            type: object
            properties:
              costsCenter:
                type: string
                nullable: true
              departmentName:
                type: string
                nullable: true
              totalAmount:
                type: number
              requestCount:
                type: integer

    # ── M3: Notificaciones ───────────────────────
    NotificationPreferences:
      type: object
      properties:
        userId:
          type: integer
        emailNotif:
          type: boolean
        appNotif:
          type: boolean
        browserNotif:
          type: boolean
      required: [userId, emailNotif, appNotif, browserNotif]

    NotificationPreferencesInput:
      type: object
      properties:
        emailNotif:
          type: boolean
        appNotif:
          type: boolean
        browserNotif:
          type: boolean

    PushSubscribeRequest:
      type: object
      required: [subscription]
      properties:
        subscription:
          type: object
          required: [endpoint, keys]
          properties:
            endpoint:
              type: string
              format: uri
            keys:
              type: object
              required: [p256dh, auth]
              properties:
                p256dh:
                  type: string
                auth:
                  type: string

    PushSubscribeResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        endpoint:
          type: string
      required: [id, userId, endpoint]

    Notification:
      type: object
      properties:
        notificationId:
          type: integer
        userId:
          type: integer
        message:
          type: string
          maxLength: 255
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [notificationId, userId, message, isRead, createdAt]

    WebhookNotificationPayload:
      type: object
      description: Payload enviado al endpoint push del navegador (Web Push API).
      properties:
        title:
          type: string
        body:
          type: string
        icon:
          type: string
          nullable: true
        data:
          type: object
          properties:
            requestId:
              type: integer
              nullable: true
            event:
              type: string
      required: [title, body]

    # ── M3: Borradores ───────────────────────────
    DraftTravelRequestInput:
      type: object
      properties:
        notes:
          type: string
          nullable: true
        requestedFee:
          type: number
          nullable: true
        routes:
          type: array
          items:
            type: object
            properties:
              originCity:
                type: string
                nullable: true
              destinationCity:
                type: string
                nullable: true
              beginningDate:
                type: string
                format: date
                nullable: true
              endingDate:
                type: string
                format: date
                nullable: true
              planeNeeded:
                type: boolean
                default: false
              hotelNeeded:
                type: boolean
                default: false

    TravelRequestResponse:
      type: object
      properties:
        requestId:
          type: integer
        userId:
          type: integer
        requestStatusId:
          type: integer
        notes:
          type: string
          nullable: true
        requestedFee:
          type: number
          nullable: true
        creationDate:
          type: string
          format: date-time
        message:
          type: string
          nullable: true

    # ── M3: Comentarios ──────────────────────────
    CreateCommentRequest:
      type: object
      required: [user_id, content]
      properties:
        user_id:
          type: integer
          minimum: 1
        content:
          type: string
          minLength: 1
          maxLength: 45000

    Comment:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        at:
          type: string
          format: date-time
        userId:
          type: integer
        requestId:
          type: integer
      required: [id, content, at, userId, requestId]

    CommentsResponse:
      type: object
      properties:
        message:
          type: string
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        meta:
          type: object
          nullable: true
          properties:
            limit:
              type: integer
            next:
              type: string
              nullable: true
      required: [message, comments]

    CommentsStreamEvent:
      type: object
      description: |
        Payload emitido como evento SSE. Se serializa como `data: <JSON>\n\n`.
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        next:
          type: string
          nullable: true
